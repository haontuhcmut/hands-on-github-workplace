name: CI Pipeline

on:
  push:
    branches:
      - feature/issue2-cicd
jobs:
  test:
    name: Run API services
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install deps
        run: |
          uv sync

      - name: Run tests
        run: |
          uv run pytest

  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test  # only run if test passed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -f app/Dockerfile -t api-services:latest .